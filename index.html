<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#D8A477" />
    <meta
      name="description"
      content="Play Draughts online — puzzles, friends, lessons, and AI."

      content="Play Draughts online — puzzles, friends, lessons, and AI."

      name="twitter:description"
      content="Play Draughts online — puzzles, friends, lessons, and AI."
    />
    <meta name="twitter:image" content="%VITE_SITE_ORIGIN%/Game-Logo.png" />

    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-title" content="Draught" />

    />
